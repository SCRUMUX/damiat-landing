<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>AI DS Generator</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      color: #333;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    h3 {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 600;
    }
    p {
      margin: 0 0 12px;
      color: #666;
      font-size: 11px;
    }
    .form-block {
      flex-shrink: 0;
      margin-bottom: 12px;
    }
    textarea {
      width: 100%;
      height: 200px;
      min-height: 120px;
      max-height: 280px;
      resize: vertical;
      font-family: "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    textarea:focus {
      outline: none;
      border-color: #0d99ff;
      box-shadow: 0 0 0 2px rgba(13, 153, 255, 0.2);
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .action-group label {
      font-size: 11px;
      font-weight: 500;
      color: #666;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #333;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover {
      background: #f5f5f5;
      border-color: #ccc;
    }
    button:active { background: #eee; }
    button.primary {
      background: #0d99ff;
      border-color: #0d99ff;
      color: #fff;
    }
    button.primary:hover {
      background: #0b87e0;
      border-color: #0b87e0;
    }
    select {
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      min-width: 160px;
      background: #fff;
    }
    .log-section {
      flex: 1;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      margin-top: 4px;
    }
    .log-header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .log-header label {
      font-size: 11px;
      font-weight: 500;
      color: #666;
    }
    .log-container {
      flex: 1;
      min-height: 0;
      padding: 10px;
      font-size: 11px;
      font-family: "JetBrains Mono", Menlo, Consolas, monospace;
      color: #333;
      white-space: pre-wrap;
      background: #f9f9f9;
      border-radius: 6px;
      border: 1px solid #eee;
      overflow-y: auto;
      word-break: break-word;
    }
    .log-container:empty { display: none; }
    .log-line {
      padding: 2px 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .log-line:last-child { border-bottom: none; }
    .log-line.error {
      color: #c53030;
      background: rgba(197, 48, 48, 0.06);
    }
  </style>
</head>
<body>
  <div class="form-block">
    <h3>AI Design System JSON</h3>
    <p>Paste JSON with <code>tokens</code> and <code>components</code> structure.</p>
    <textarea id="json" placeholder='{"tokens": {...}, "components": [...]}'></textarea>
    <div class="actions">
      <div class="action-group">
        <label>Tokens</label>
        <div class="row">
          <button id="generate-tokens" class="primary">Generate Tokens</button>
          <button id="export-tokens">Export Tokens</button>
        </div>
      </div>
      <div class="action-group">
        <label>Components</label>
        <div class="row">
          <select id="component-select">
            <option value="">All components</option>
          </select>
          <button id="generate-components" class="primary">Generate</button>
        </div>
        <div class="row" style="margin-top: 4px;">
          <label style="display: flex; align-items: center; gap: 6px; font-size: 11px; color: #333; cursor: pointer;">
            <input id="strict-mode" type="checkbox" />
            Strict AICADS validation (abort on unknown roles)
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <label>Log — successful reports and errors</label>
      <div class="row">
        <button id="copy-log" title="Copy full log">Copy log</button>
        <button id="clear-log" title="Clear log">Clear</button>
      </div>
    </div>
    <div class="log-container" id="log"></div>
  </div>

  <script>
    const textarea = document.getElementById('json');
    const logEl = document.getElementById('log');
    let logLines = [];

    function isErrorLine(text) {
      const t = (text || '').toLowerCase();
      return t.indexOf('ошибка') !== -1 || t.indexOf('error') !== -1 ||
             t.indexOf('failed') !== -1 || t.indexOf('не найден') !== -1 ||
             t.indexOf('не удалось') !== -1;
    }

    function appendLog(text) {
      if (text == null || text === '') return;
      const lines = String(text).split('\n');
      lines.forEach(function (line) {
        logLines.push(line.trim() || line);
      });
      renderLog();
    }

    function renderLog() {
      logEl.innerHTML = '';
      logLines.forEach(function (line) {
        const div = document.createElement('div');
        div.className = 'log-line' + (isErrorLine(line) ? ' error' : '');
        div.textContent = line;
        logEl.appendChild(div);
      });
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      logLines = [];
      renderLog();
    }

    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      var ok = false;
      try { ok = document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      return ok ? Promise.resolve() : Promise.reject(new Error('execCommand failed'));
    }

    function copyLog() {
      const text = logLines.join('\n');
      const btn = document.getElementById('copy-log');
      const orig = btn.textContent;
      if (!text) {
        btn.textContent = 'Log is empty';
        setTimeout(function () { btn.textContent = orig; }, 1200);
        return;
      }
      copyToClipboard(text).then(function () {
        btn.textContent = 'Copied!';
        setTimeout(function () { btn.textContent = orig; }, 1200);
      }).catch(function () {
        btn.textContent = 'Copy failed';
        setTimeout(function () { btn.textContent = orig; }, 1500);
      });
    }

    document.getElementById('copy-log').onclick = copyLog;
    document.getElementById('clear-log').onclick = clearLog;

    function updateComponentSelect() {
      let parsed;
      try {
        parsed = JSON.parse(textarea.value);
      } catch (e) {
        return;
      }
      const comps = Array.isArray(parsed.components) ? parsed.components : [];
      const select = document.getElementById('component-select');
      const current = select.value;
      select.innerHTML = '<option value="">All components</option>';
      comps.forEach(function (c) {
        if (c && c.name) {
          const opt = document.createElement('option');
          opt.value = c.name;
          opt.textContent = c.name;
          select.appendChild(opt);
        }
      });
      if (current && Array.from(select.options).some(o => o.value === current)) {
        select.value = current;
      }
    }

    function send(type, extra) {
      let parsed;
      try {
        parsed = JSON.parse(textarea.value);
      } catch (e) {
        let hint = '';
        const trimmed = (textarea.value || '').trim();
        if (/^\s*(\/\/|\/\*|function\s|var\s|<!DOCTYPE)/.test(trimmed)) {
          hint = ' Вставьте содержимое ai-ds-spec.json, а не код плагина.';
        }
        clearLog();
        appendLog('Ошибка парсинга JSON: ' + e.message + hint);
        return;
      }
      const payload = { type, spec: parsed };
      if (extra && typeof extra === 'object') Object.assign(payload, extra);
      parent.postMessage({ pluginMessage: payload }, '*');
      clearLog();
      appendLog('Отправил команду ' + type + '...');
    }

    textarea.addEventListener('input', updateComponentSelect);
    textarea.addEventListener('change', updateComponentSelect);
    updateComponentSelect();

    document.getElementById('generate-tokens').onclick = function () {
      send('generate-tokens');
    };

    document.getElementById('generate-components').onclick = function () {
      const selected = document.getElementById('component-select').value;
      send('generate-components', selected ? { componentName: selected } : {});
    };

    document.getElementById('export-tokens').onclick = function () {
      send('export-tokens');
    };

    // AICADS strict-mode toggle — phase 10 task 10.12. Communicates plugin-side
    // so the manifest validator either warns (default) or aborts (strict).
    var strictCheckbox = document.getElementById('strict-mode');
    strictCheckbox.addEventListener('change', function () {
      parent.postMessage(
        { pluginMessage: { type: 'set-strict-mode', value: strictCheckbox.checked } },
        '*'
      );
    });

    // Приём статуса от плагина
    window.onmessage = function (event) {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'status') {
        appendLog(msg.text || '');
      } else if (msg.type === 'export-tokens-result') {
        try {
          textarea.value = JSON.stringify(msg.spec || {}, null, 2);
          appendLog('Tokens exported from Figma into JSON.');
        } catch (e) {
          appendLog('Ошибка при сериализации экспортированных токенов: ' + e.message);
        }
      }
    };
  </script>
</body>
</html>
